name: Build releases

# Auto-build self-contained Windows + macOS zips whenever:
#   - a tag matching v* is pushed  (e.g. `git tag v1.1.0 && git push --tags`)
#   - or someone clicks "Run workflow" in the Actions tab (manual trigger)
#
# Each zip is attached to the GitHub Release (created automatically for
# tags) so end-users can grab it from the repo's Releases page without
# needing Python installed on their machine.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release to upload

jobs:
  # ---------------------------------------------------------------------
  # Windows -> perchy-vX.Y.Z-windows-x64.zip
  # ---------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --clean --noconfirm
          --name perchy
          --windowed
          --noupx
          main.py

      - name: Copy user-facing files next to the exe
        shell: cmd
        run: |
          xcopy /E /I /Y assets dist\perchy\assets
          copy "使用说明.txt" dist\perchy\
          copy stop.bat dist\perchy\

      - name: Zip release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "manual-$(Get-Date -Format 'yyyyMMdd-HHmmss')" }
          Compress-Archive -Path dist\perchy -DestinationPath "perchy-$version-windows-x64.zip" -Force
          Get-ChildItem perchy-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perchy-windows-x64
          path: perchy-*-windows-x64.zip

      - name: Publish to Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: perchy-*-windows-x64.zip
          body: |
            ## How to use

            **Windows**: Download `perchy-${{ github.ref_name }}-windows-x64.zip`
            below, extract, and double-click `perchy.exe`.

            **macOS**: Download `Perchy-${{ github.ref_name }}-macos.zip`,
            extract, and double-click `Perchy.app`. The first launch
            requires granting Accessibility permission -- see
            `使用说明_macOS.txt` inside the zip.

            See `使用说明.txt` for the full Chinese quickstart (auto-start
            at login, adding your own pet images, etc.).

  # ---------------------------------------------------------------------
  # macOS (Apple Silicon) -> Perchy-vX.Y.Z-macos.zip
  # ---------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm \
            --name Perchy \
            --windowed \
            --noupx \
            --osx-bundle-identifier com.hveinblg.perchy \
            main.py

      - name: Info.plist -> LSUIElement (hide from Dock)
        run: |
          /usr/libexec/PlistBuddy \
            -c "Delete :LSUIElement" \
            dist/Perchy.app/Contents/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy \
            -c "Add :LSUIElement bool true" \
            dist/Perchy.app/Contents/Info.plist

      - name: Copy user-facing files alongside the .app
        run: |
          cp -R assets dist/
          [ -f "使用说明.txt" ]       && cp "使用说明.txt"       dist/ || true
          [ -f "使用说明_macOS.txt" ] && cp "使用说明_macOS.txt" dist/ || true

      - name: Zip release
        run: |
          VERSION="${GITHUB_REF_NAME:-manual-$(date -u +%Y%m%d-%H%M%S)}"
          cd dist
          zip -r "../Perchy-${VERSION}-macos.zip" .
          cd ..
          ls -la Perchy-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perchy-macos
          path: Perchy-*-macos.zip

      - name: Publish to Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Perchy-*-macos.zip
