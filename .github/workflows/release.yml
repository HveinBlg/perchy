name: Build releases

# Auto-build self-contained Windows + macOS zips whenever:
#   - a tag matching v* is pushed  (e.g. `git tag v1.1.0 && git push --tags`)
#   - or someone clicks "Run workflow" in the Actions tab (manual trigger)
#
# Each zip is attached to the GitHub Release (created automatically for
# tags) so end-users can grab it from the repo's Releases page without
# needing Python installed on their machine.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed for softprops/action-gh-release to upload

jobs:
  # ---------------------------------------------------------------------
  # Windows -> perchy-vX.Y.Z-windows-x64.zip
  # ---------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --clean --noconfirm
          --name perchy
          --windowed
          --noupx
          main.py

      - name: Copy user-facing files next to the exe
        shell: cmd
        run: |
          xcopy /E /I /Y assets dist\perchy\assets
          copy "使用说明.txt" dist\perchy\
          copy USAGE.txt dist\perchy\
          copy stop.bat dist\perchy\

      - name: Zip release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "manual-$(Get-Date -Format 'yyyyMMdd-HHmmss')" }
          Compress-Archive -Path dist\perchy -DestinationPath "perchy-$version-windows-x64.zip" -Force
          Get-ChildItem perchy-*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perchy-windows-x64
          path: perchy-*-windows-x64.zip

      - name: Publish to Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: perchy-*-windows-x64.zip
          body: |
            ## How to use

            **Windows**: Download `perchy-${{ github.ref_name }}-windows-x64.zip`
            below, extract, and double-click `perchy.exe`.

            **macOS 11+**: Download `Perchy-${{ github.ref_name }}-macos.dmg`,
            mount, drag `Perchy.app` and the `assets` folder to the same
            location, then double-click `Perchy.app`. First launch
            requires granting Accessibility permission.

            **macOS 10.15 Catalina**: Download `Perchy-${{ github.ref_name }}-macos-legacy.dmg`
            instead. Same steps.

            See `USAGE.txt` (English) or `使用说明.txt` (Chinese) inside
            the download for the full quickstart -- both Windows and
            macOS sections, plus auto-start setup, custom pet images,
            and troubleshooting.

  # ---------------------------------------------------------------------
  # macOS (Apple Silicon)  ->  Perchy-vX.Y.Z-macos.dmg
  # ---------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm \
            --name Perchy \
            --windowed \
            --noupx \
            --osx-bundle-identifier com.hveinblg.perchy \
            main.py

      - name: Info.plist tweaks (LSUIElement + version string)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev-$(date -u +%Y%m%d-%H%M%S)"
          PLIST="dist/Perchy.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :LSUIElement" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$PLIST"

      - name: Prepare DMG staging (app + user-editable assets + docs)
        run: |
          rm -rf dist/dmg-staging
          mkdir -p dist/dmg-staging
          # The .app itself
          cp -R dist/Perchy.app dist/dmg-staging/
          # User-editable pet images live NEXT TO the .app -- our
          # main.py's _app_dir() finds them there when the .app is
          # launched. Users can drop their own PNGs into
          # dmg-staging/assets/pets/ after installing.
          cp -R assets dist/dmg-staging/
          [ -f "使用说明.txt" ] && cp "使用说明.txt" dist/dmg-staging/ || true
          [ -f "USAGE.txt" ]    && cp "USAGE.txt"    dist/dmg-staging/ || true
          # Handy shortcut so users can drag Perchy.app straight to /Applications.
          ln -s /Applications "dist/dmg-staging/Applications"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev-$(date -u +%Y%m%d-%H%M%S)"
          # UDZO = zlib-compressed, small and universally openable.
          hdiutil create \
            -volname "Perchy $VERSION" \
            -srcfolder dist/dmg-staging \
            -ov \
            -format UDZO \
            "Perchy-v${VERSION}-macos.dmg"
          ls -la Perchy-*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perchy-macos
          path: Perchy-*-macos.dmg

      - name: Publish to Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Perchy-*-macos.dmg

  # ---------------------------------------------------------------------
  # macOS LEGACY (10.15 Catalina compatible)
  #   -> Perchy-vX.Y.Z-macos-legacy.dmg
  #
  # PyQt6 hard-requires macOS 11 (Big Sur). Users still on macOS 10.15
  # (Catalina, EOL since 2022) get a compatible build here by
  # substituting:
  #     - PyQt6 -> PyQt5 5.15  (supports macOS 10.13+)
  #     - Python 3.12 -> Python 3.9  (last version with clean 10.15
  #                                   wheel support for our deps)
  #     - MACOSX_DEPLOYMENT_TARGET=10.15 so the linker embeds 10.15
  #       as the minimum system version
  #     - LSMinimumSystemVersion=10.15 in Info.plist so Finder /
  #       Launch Services also agree
  # ---------------------------------------------------------------------
  build-macos-legacy:
    runs-on: macos-13   # Ventura runner still has Xcode SDKs that can
                        # target 10.15 without hunting for old SDKs.
    env:
      MACOSX_DEPLOYMENT_TARGET: '10.15'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies (PyQt5 branch)
        run: |
          python -m pip install --upgrade pip
          pip install "PyQt5>=5.15,<5.16" \
                      "pyobjc-framework-Cocoa>=9.0" \
                      "pyobjc-framework-Quartz>=9.0" \
                      "pyinstaller>=5.13"

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm \
            --name Perchy \
            --windowed \
            --noupx \
            --osx-bundle-identifier com.hveinblg.perchy \
            --exclude-module PyQt6 \
            main.py

      - name: Info.plist tweaks (LSUIElement + version + minimum system)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev-$(date -u +%Y%m%d-%H%M%S)"
          PLIST="dist/Perchy.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :LSUIElement" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $VERSION" "$PLIST"
          # The critical bit for 10.15 users: tell Launch Services the
          # bundle IS OK to run on their older OS.
          /usr/libexec/PlistBuddy -c "Set :LSMinimumSystemVersion 10.15" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :LSMinimumSystemVersion string 10.15" "$PLIST"

      - name: Prepare DMG staging (legacy)
        run: |
          rm -rf dist/dmg-staging
          mkdir -p dist/dmg-staging
          cp -R dist/Perchy.app dist/dmg-staging/
          cp -R assets dist/dmg-staging/
          [ -f "使用说明.txt" ] && cp "使用说明.txt" dist/dmg-staging/ || true
          [ -f "USAGE.txt" ]    && cp "USAGE.txt"    dist/dmg-staging/ || true
          ln -s /Applications "dist/dmg-staging/Applications"

      - name: Create DMG (legacy)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev-$(date -u +%Y%m%d-%H%M%S)"
          hdiutil create \
            -volname "Perchy $VERSION Legacy" \
            -srcfolder dist/dmg-staging \
            -ov \
            -format UDZO \
            "Perchy-v${VERSION}-macos-legacy.dmg"
          ls -la Perchy-*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: perchy-macos-legacy
          path: Perchy-*-macos-legacy.dmg

      - name: Publish to Releases (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Perchy-*-macos-legacy.dmg
